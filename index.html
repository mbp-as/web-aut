<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret App | v0.0.3</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: black; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 350px; text-align: center; }
        .logo { width: 120px; height: 120px; background: #FFB800; border-radius: 30px; margin: 0 auto 40px; display: flex; align-items: center; justify-content: center; }
        .logo-icon { width: 60px; height: 60px; background: white; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); }
        h1 { font-size: 32px; font-weight: bold; margin-bottom: 30px; }
        .input-field { background: #1C1C1E; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: left; color: #8E8E93; border: 1px solid #333; }
        .btn { background: white; color: black; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; margin-bottom: 20px; }
        .status-box { background: #1C1C1E; border-radius: 12px; padding: 15px; font-family: monospace; font-size: 12px; text-align: left; color: #8E8E93; min-height: 80px; }
        .version { font-size: 10px; color: #444; margin-top: 20px; letter-spacing: 1px; }
        .success { color: #4CD964; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo"><div class="logo-icon"></div></div>
    <h1>Secret</h1>
    
    <div class="input-field">Максим</div>
    
    <button class="btn" id="auth-btn">Увійти з FaceID</button>
    
    <div class="status-box" id="log-output">
        > Очікування входу...
    </div>

    <div class="version">0.0.3</div>
</div>

<script>
const log = (msg, isSuccess = false) => {
    const div = document.getElementById('log-output');
    div.innerHTML += `<br> > ${isSuccess ? '<span class="success">✅</span> ' : ''}${msg}`;
};

document.getElementById('auth-btn').addEventListener('click', async () => {
    log("Запуск автентифікації...");

    try {
        // Симулюємо запит до WebAuthn (FaceID)
        const challenge = new Uint8Array(32);
        window.crypto.getRandomValues(challenge);

        const options = {
            publicKey: {
                challenge: challenge,
                rp: { name: "Secret App", id: window.location.hostname },
                user: { id: Uint8Array.from("1", c => c.charCodeAt(0)), name: "Maksym", displayName: "Максим" },
                pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                authenticatorSelection: { authenticatorAttachment: "platform" },
                timeout: 60000
            }
        };

        const credential = await navigator.credentials.create(options);
        
        if (credential) {
            log("УСПІХ! Ключ отримано", true);
            log("Перехід до системи...");
            
            // Ось тут магія редиректу!
            setTimeout(() => {
                // Заміни 'home.html' на реальну назву твоєї сторінки
                window.location.href = 'home.html'; 
            }, 1000);
        }

    } catch (err) {
        log("Помилка: " + err.message);
    }
});
</script>

</body>
</html>
