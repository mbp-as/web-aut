<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Auth | Максим</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .logo-box {
            background: linear-gradient(135deg, #FFB000, #FFCC00);
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .shield-icon {
            width: 60px;
            height: 60px;
            background: white;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); /* Спрощений щит */
        }
        h1 { font-size: 2.2rem; margin-bottom: 30px; font-weight: 600; }
        .input-field {
            background: #1C1C1E;
            border: none;
            color: white;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .btn-auth {
            background: white;
            color: black;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-auth:active { opacity: 0.7; }
        #debug-info {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #8E8E93;
            text-align: left;
            background: #1C1C1E;
            padding: 15px;
            border-radius: 10px;
            display: none; /* Показуємо тільки при помилці або натисканні */
            white-space: pre-wrap;
            word-break: break-all;
        }
        .error-text { color: #FF453A; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-box">
        <div class="shield-icon"></div>
    </div>
    <h1>Secret</h1>

    <input type="text" class="input-field" value="Максим" readonly>
    <button id="auth-btn" class="btn-auth">Увійти з FaceID</button>

    <div id="debug-info"></div>
</div>

<script>
const btn = document.getElementById('auth-btn');
const debug = document.getElementById('debug-info');

function log(message, isError = false) {
    debug.style.display = 'block';
    const span = document.createElement('div');
    if (isError) span.className = 'error-text';
    span.innerText = `> ${message}`;
    debug.appendChild(span);
    console.log(message);
}

btn.addEventListener('click', async () => {
    debug.innerHTML = ''; // Очистити лог
    log("Запуск автентифікації...");

    try {
        // ПЕРЕВІРКА 1: Протокол
        log(`Протокол: ${window.location.protocol}`);
        if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
            throw new Error("Браузер блокує FaceID на HTTP. Потрібен HTTPS.");
        }

        // ПЕРЕВІРКА 2: Наявність API
        if (!window.PublicKeyCredential) {
            throw new Error("Ваш браузер не підтримує WebAuthn API.");
        }

        // ПЕРЕВІРКА 3: Доступність біометрії
        const isAvailable = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        log(`Біометрія доступна: ${isAvailable}`);
        if (!isAvailable) {
            throw new Error("Платформний автентифікатор (FaceID) недоступний або вимкнений.");
        }

        // ПАРАМЕТРИ (спрощені для тесту реєстрації)
        const challenge = new Uint8Array(32); 
        window.crypto.getRandomValues(challenge);

        const options = {
            publicKey: {
                challenge: challenge,
                rp: { name: "Secret App", id: window.location.hostname },
                user: {
                    id: Uint8Array.from("USER_ID_MAX", c => c.charCodeAt(0)),
                    name: "maksym",
                    displayName: "Максим"
                },
                pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                authenticatorSelection: {
                    authenticatorAttachment: "platform",
                    userVerification: "required"
                },
                timeout: 60000
            }
        };

        log("Виклик системного вікна FaceID...");
        const credential = await navigator.credentials.create(options);
        
        log("✅ УСПІХ! Отримано ID ключа: " + credential.id);
        alert("Авторизація успішна!");

    } catch (err) {
        log(`ПОМИЛКА: ${err.name}`, true);
        log(`ДЕТАЛІ: ${err.message}`, true);
        
        if (window.self !== window.top) {
            log("⚠️ ДЕТЕКТОР: Скрипт запущено в IFRAME (це причина блокування в GAS).", true);
        }
    }
});
</script>

</body>
</html>
