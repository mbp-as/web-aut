<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tab Bar App</title>

<!-- Іконки -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* Контент */
.content {
    padding: 20px;
    padding-bottom: 100px;
}

/* Сторінки */
.tab {
    display: none;
}

.tab.active {
    display: block;
}

/* Таб бар */
.tabbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 70px;
    background: white;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid #ddd;
    transition: transform 0.3s ease;
}

/* Мінімізація */
.tabbar.hide {
    transform: translateY(100%);
}

/* Кнопки */
.tab-btn {
    flex: 1;
    text-align: center;
    color: #777;
    font-size: 12px;
    cursor: pointer;
}

.tab-btn i {
    display: block;
    font-size: 20px;
    margin-bottom: 4px;
}

/* Активна вкладка */
.tab-btn.active {
    color: hotpink;
}
</style>
</head>

<body>

<div class="content">

    <div id="dash" class="tab active">
        <h2>Dash</h2>
        <p>Dashboard content</p>
    </div>

    <div id="trends" class="tab">
        <h2>Trends</h2>
        <p>Trends content</p>
    </div>

    <div id="shop" class="tab">
        <h2>Shop</h2>
        <p>Shop content</p>
    </div>

    <div id="profile" class="tab">
        <h2>Profile</h2>
        <p>Profile content</p>
    </div>

    <div id="search" class="tab">
        <h2>Search</h2>
        <p>Search content</p>
    </div>

    <!-- Просто щоб був скрол -->
    <div style="height: 1200px;"></div>

</div>

<!-- TAB BAR -->
<div class="tabbar" id="tabbar">
    <div class="tab-btn active" onclick="openTab('dash', this)">
        <i class="fa-solid fa-gauge"></i>
        Dash
    </div>
    <div class="tab-btn" onclick="openTab('trends', this)">
        <i class="fa-solid fa-fire"></i>
        Trends
    </div>
    <div class="tab-btn" onclick="openTab('shop', this)">
        <i class="fa-solid fa-bag-shopping"></i>
        Shop
    </div>
    <div class="tab-btn" onclick="openTab('profile', this)">
        <i class="fa-solid fa-user"></i>
        Profile
    </div>
    <div class="tab-btn" onclick="openTab('search', this)">
        <i class="fa-solid fa-magnifying-glass"></i>
        Search
    </div>
</div>

<script>
// Перемикання табів
function openTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
}

// Мінімізація при скролі вниз
let lastScroll = 0;
const tabbar = document.getElementById("tabbar");

window.addEventListener("scroll", () => {
    let current = window.pageYOffset;

    if (current > lastScroll) {
        tabbar.classList.add("hide"); // вниз
    } else {
        tabbar.classList.remove("hide"); // вверх
    }

    lastScroll = current;
});
</script>

</body>
</html>
